<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 font-['Outfit']">

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <nav class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-lg">
        <h1 class="font-black italic text-yellow-500">SHISHI ADMIN</h1>
        <button onclick="logoutAdmin()" class="bg-red-600 px-4 py-2 rounded-lg text-xs font-bold shadow-md active:scale-95">LOGOUT</button>
    </nav>

    <div class="p-4 max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black text-slate-800">Oda Zilizopokelewa</h2>
            <button onclick="clearAll()" class="text-xs text-red-500 underline font-bold">Futa Zote</button>
        </div>

        <div id="adminList" class="space-y-4">
            </div>
    </div>

    <script>
        // --- SEHEMU YA ULINZI (LOGOUT FIX) ---
        // Tunatumia localStorage ili asitolewe nje kila mara
        const auth = localStorage.getItem('shishi_admin_auth');
        
        if (auth !== 'true') {
            window.location.replace('admin_login.html');
        }

        let lastOrderCount = 0;

        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('shishi_master_db')) || [];
            const list = document.getElementById('adminList');
            
            if (orders.length > lastOrderCount && lastOrderCount !== 0) {
                document.getElementById('notifSound').play().catch(e => console.log("Sauti inahitaji interaction"));
            }
            lastOrderCount = orders.length;

            if(orders.length === 0) {
                list.innerHTML = `<p class="text-center py-20 text-gray-400">Hakuna oda mpya.</p>`;
                return;
            }

            list.innerHTML = orders.map((o, i) => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border-l-4 ${o.status === 'COMPLETED' ? 'border-green-500 opacity-60' : 'border-yellow-500'}">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="flex gap-2 items-center mb-1">
                                <span class="text-[9px] bg-black text-white px-2 py-0.5 rounded font-black tracking-widest">${o.status || 'PENDING'}</span>
                                <span class="text-[10px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded font-black">${o.branch}</span>
                            </div>
                            <h3 class="text-lg font-black mt-1">${o.name}</h3>
                            <p class="text-blue-600 text-xs font-bold">${o.phone}</p>
                        </div>
                        <span class="text-[10px] text-gray-400 font-bold">${o.date}</span>
                    </div>
                    
                    <div class="bg-gray-50 p-4 rounded-2xl text-sm mb-4">
                        <p><strong>Vyakula:</strong> ${formatItems(o.items)}</p>
                        <p class="mt-2"><strong>Location:</strong> ${o.location}</p>
                        <p><strong>Malipo:</strong> ${o.payment}</p>
                    </div>

                    <div class="flex gap-2 mt-4 items-center">
                        ${(!o.status || o.status === 'PENDING') ? 
                            `<button onclick="updateStatus(${i}, 'RECEIVED')" class="bg-blue-600 text-white text-xs px-4 py-2 rounded-lg font-bold shadow-md active:scale-95 transition">VERIFY ORDER</button>` : ''}
                        
                        ${o.status === 'RECEIVED' ? 
                            `<button onclick="updateStatus(${i}, 'COMPLETED')" class="bg-green-600 text-white text-xs px-4 py-2 rounded-lg font-bold shadow-md active:scale-95 transition">MARK COMPLETED</button>` : ''}
                        
                        <button onclick="deleteOrder(${i})" class="text-red-500 text-xs font-bold flex items-center gap-1 ml-auto">
                            <i data-lucide="trash-2" class="w-3 h-3"></i> Futa Oda
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function formatItems(items) {
            if (typeof items === 'string') return items;
            return Object.entries(items).map(([k,v]) => `${k} (x${v})`).join(', ');
        }

        function updateStatus(index, newStatus) {
            let orders = JSON.parse(localStorage.getItem('shishi_master_db'));
            orders[index].status = newStatus;
            localStorage.setItem('shishi_master_db', JSON.stringify(orders));
            loadOrders();
        }

        function deleteOrder(i) {
            if(confirm("Futa oda hii?")) {
                let orders = JSON.parse(localStorage.getItem('shishi_master_db'));
                orders.splice(i, 1);
                localStorage.setItem('shishi_master_db', JSON.stringify(orders));
                loadOrders();
            }
        }

        function clearAll() {
            if(confirm("Futa oda zote?")) {
                localStorage.removeItem('shishi_master_db');
                loadOrders();
            }
        }

        // --- FIX LOGOUT ---
        function logoutAdmin() {
            localStorage.removeItem('shishi_admin_auth');
            window.location.replace('index.html');
        }

        setInterval(loadOrders, 5000);
        loadOrders();
    </script>
</body>
</html>
