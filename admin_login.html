<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Shishi Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl text-white border border-slate-700">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-yellow-500 rounded-2xl flex items-center justify-center mx-auto mb-4 rotate-3 shadow-lg">
                <i data-lucide="shield-check" class="text-black w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black mb-1 text-yellow-500 uppercase tracking-tighter">ADMIN ACCESS</h2>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Shishi Food Point</p>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <i data-lucide="user" class="absolute left-4 top-4 w-5 h-5 text-slate-500"></i>
                <input type="text" id="admUser" placeholder="Username" 
                    class="w-full pl-12 pr-4 py-4 bg-slate-700 rounded-2xl border-none outline-none focus:ring-2 focus:ring-yellow-500 transition-all text-sm">
            </div>

            <div class="relative">
                <i data-lucide="lock" class="absolute left-4 top-4 w-5 h-5 text-slate-500"></i>
                <input type="password" id="admPass" placeholder="Password" 
                    class="w-full pl-12 pr-4 py-4 bg-slate-700 rounded-2xl border-none outline-none focus:ring-2 focus:ring-yellow-500 transition-all text-sm">
            </div>

            <button onclick="checkAdmin()" 
                class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl hover:bg-yellow-400 active:scale-95 transition-all shadow-xl flex items-center justify-center gap-2 mt-6">
                INGIA DASHBOARD <i data-lucide="arrow-right-circle" class="w-5 h-5"></i>
            </button>

            <a href="index.html" class="block text-center text-slate-500 text-xs mt-6 hover:text-white transition-colors">
                <i data-lucide="arrow-left" class="inline w-3 h-3 mr-1"></i> Rudi Ukurasa wa Mteja
            </a>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        function checkAdmin() {
            const user = document.getElementById('admUser').value;
            const pass = document.getElementById('admPass').value;

            // Username: admin | Password: 1234
            if(user === 'admin' && pass === '1234') {
                
                // MUHIMU: Tunatumia localStorage ili asitolewe nje (Logout Fix)
                localStorage.setItem('shishi_admin_auth', 'true');
                
                // Pia tunahakikisha Keys nyingine za zamani zinafutwa kuzuia migongano
                localStorage.removeItem('isAdmin'); 

                // Mpeleke admin kwenye dashboard
                window.location.replace('admin_dashboard.html');
                
            } else { 
                alert("Login Imefeli! Hakikisha Username na Password ni sahihi."); 
            }
        }

        // Ruhusu kuingia kwa kubonyeza "Enter" key
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAdmin();
            }
        });
    </script>
</body>
</html>
