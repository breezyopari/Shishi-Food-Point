<!-- ===================== NEW SYSTEM ADDITIONS ===================== -->

<!-- TOAST -->
<div id="toast" class="hidden fixed top-5 right-5 bg-green-500 text-white px-4 py-2 rounded-xl z-50"></div>

<!-- LOGIN -->
<div id="loginPage" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
<div class="bg-white p-6 rounded-xl w-[320px] text-center">
<h2 class="font-bold text-lg mb-3">Shishi Login</h2>

<input id="loginUser" placeholder="Username" class="w-full p-2 border mb-2">
<input id="loginPass" type="password" placeholder="Password" class="w-full p-2 border mb-2">

<select id="branchSelect" class="w-full p-2 border mb-3">
<option value="">Chagua Branch</option>
<option>Dar es Salaam</option>
<option>Dodoma</option>
</select>

<button onclick="login()" class="bg-yellow-500 text-white w-full p-2 rounded mb-2">Login</button>
<button onclick="showRegister()" class="text-sm underline">Register</button>
<button onclick="skipLogin()" class="text-sm underline block mt-1">Skip</button>
</div>
</div>

<!-- REGISTER -->
<div id="registerPage" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
<div class="bg-white p-6 rounded-xl w-[320px] text-center">
<h2 class="font-bold mb-3">Register</h2>
<input id="regUser" placeholder="Username" class="w-full p-2 border mb-2">
<input id="regPass" type="password" placeholder="Password" class="w-full p-2 border mb-2">
<button onclick="register()" class="bg-green-500 text-white w-full p-2 rounded">Create</button>
<button onclick="backLogin()" class="text-sm underline mt-2">Back</button>
</div>
</div>

<!-- DELIVERY + PAYMENT -->
<div class="container mx-auto px-4 mt-6">
<div class="menu-container">

<h3 class="font-bold mb-3">Delivery</h3>
<input id="phone" placeholder="Namba ya simu" class="w-full p-2 border mb-2 rounded">
<input id="location" placeholder="Location yako" class="w-full p-2 border mb-3 rounded">

<h3 class="font-bold mb-2">Malipo</h3>
<select id="payment" class="w-full p-2 border rounded mb-2">
<option value="">Chagua Malipo</option>
<option>M-Pesa</option>
<option>TigoPesa</option>
<option>Airtel Money</option>
</select>

<div id="payInfo" class="text-sm text-gray-600"></div>

<button onclick="previewOrder()" class="order-summary-btn mt-4 bg-blue-600">
Preview Order
</button>

</div>
</div>

<!-- PREVIEW MODAL -->
<div id="previewBox" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
<div class="bg-white p-5 rounded-xl w-[320px]">
<h3 class="font-bold mb-2">Receipt</h3>
<div id="summary"></div>
<button onclick="confirmOrder()" class="bg-green-500 text-white w-full p-2 mt-3 rounded">Confirm</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminPage" class="hidden fixed inset-0 bg-white z-50 p-4 overflow-auto">
<h2 class="font-bold text-xl mb-3">ADMIN DASHBOARD</h2>
<div id="adminOrders"></div>
<button onclick="logout()" class="bg-red-500 text-white p-2 mt-3 rounded">Logout</button>
</div>

<script>

/* ================= GLOBAL ================= */
let users = JSON.parse(localStorage.getItem("users")) || [];
let allOrders = JSON.parse(localStorage.getItem("allOrders")) || [];
let branch = "";

/* ================= TOAST ================= */
function toast(msg){
let t = document.getElementById("toast");
t.innerText = msg;
t.classList.remove("hidden");
setTimeout(()=>t.classList.add("hidden"),2000);
}

/* ================= AUTH ================= */
function login(){
let u = loginUser.value;
let p = loginPass.value;
let b = branchSelect.value;

if(u==="admin" && p==="1234"){
loginPage.classList.add("hidden");
adminPage.classList.remove("hidden");
renderAdmin();
return;
}

if(!b){toast("Chagua branch"); return;}

branch = b;
localStorage.setItem("branch",b);

loginPage.classList.add("hidden");
document.querySelector("h1").innerText = "Karibu Shishi Food "+b;
}

function skipLogin(){
loginPage.classList.add("hidden");
}

function showRegister(){
loginPage.classList.add("hidden");
registerPage.classList.remove("hidden");
}

function backLogin(){
registerPage.classList.add("hidden");
loginPage.classList.remove("hidden");
}

function register(){
users.push({u:regUser.value,p:regPass.value});
localStorage.setItem("users",JSON.stringify(users));
toast("Registered");
backLogin();
}

function logout(){
location.reload();
}

/* ================= PAYMENT ================= */
payment.onchange = ()=>{
if(payment.value==="M-Pesa") payInfo.innerText="Lipa: 255700000000";
if(payment.value==="TigoPesa") payInfo.innerText="Lipa: 255600000000";
if(payment.value==="Airtel Money") payInfo.innerText="Lipa: 255780000000";
};

/* ================= PREVIEW ================= */
function previewOrder(){
if(Object.keys(myOrder).length===0){
toast("Chagua chakula");
return;
}

let sum="";
for(let k in myOrder){
sum += k+"("+myOrder[k]+")<br>";
}

sum += "<br><b>Payment:</b> "+payment.value;
sum += "<br><b>Simu:</b> "+phone.value;
sum += "<br><b>Location:</b> "+location.value;

summary.innerHTML = sum;
previewBox.classList.remove("hidden");
}

/* ================= CONFIRM ================= */
function confirmOrder(){

let data={
items: myOrder,
phone: phone.value,
location: location.value,
payment: payment.value,
branch: branch || "Mteja",
date: new Date().toLocaleString()
};

allOrders.unshift(data);
localStorage.setItem("allOrders",JSON.stringify(allOrders));

let text = "ODA:%0A"+JSON.stringify(data);
window.open("https://wa.me/255712345678?text="+text);

previewBox.classList.add("hidden");

toast("Order imetumwa!");

/* RESET */
myOrder = {};
document.querySelectorAll(".qty-val").forEach(s=>s.innerText=0);
document.getElementById("instructions").value="";
phone.value="";
location.value="";
payment.value="";
payInfo.innerText="";

/* RETURN TOP */
setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),3000);
}

/* ================= ADMIN ================= */
function renderAdmin(){
let box = document.getElementById("adminOrders");

if(allOrders.length===0){
box.innerHTML="Hakuna orders";
return;
}

box.innerHTML = allOrders.map(o=>`
<div class="border p-3 mb-2 rounded">
${o.date}<br>
${JSON.stringify(o.items)}<br>
💳 ${o.payment}<br>
📞 ${o.phone}<br>
📍 ${o.location}<br>
🏙️ ${o.branch}
</div>
`).join("");
}

</script>
