<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karibu | Shishi Food Point</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-pattern {
            background-color: #facc15;
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
        }
        .hidden-form { display: none; }
        .wrapper { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-pattern">

    <div class="wrapper">
        <main class="flex-grow flex flex-col items-center justify-center p-4 gap-4">
            
            <div class="max-w-sm w-full overflow-hidden rounded-[2rem] shadow-2xl border-4 border-white bg-black aspect-video relative">
                <video autoplay loop muted playsinline class="w-full h-full object-cover">
                    <source src="videoad.mp4" type="video/mp4">
                    Browser yako haisapoti video.
                </video>
                <div class="absolute inset-0 bg-black/10"></div>
            </div>

            <div class="max-w-sm w-full bg-white p-6 rounded-[2.5rem] shadow-2xl border-4 border-black/5">
                <div class="text-center mb-6">
                    <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-3 rotate-6 shadow-xl border-4 border-yellow-500 overflow-hidden">
                        <img src="logo.webp" alt="Shishi Logo" class="w-full h-full object-cover">
                    </div>
                    
                    <h2 class="text-2xl font-black tracking-tighter uppercase text-slate-900">
                        SHISHI <span class="text-yellow-500">FOOD</span>
                    </h2>
                    <p id="form-subtitle" class="text-gray-400 text-[9px] font-bold uppercase tracking-[0.2em] mt-1 italic">Jisajili kupata huduma</p>
                </div>
                
                <form id="registerForm" class="space-y-3">
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-3.5 w-4 h-4 text-gray-400"></i>
                        <input type="text" id="reg-name" placeholder="Jina lako kamili" required 
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-yellow-500 outline-none text-sm">
                    </div>
                    <div class="relative">
                        <i data-lucide="phone" class="absolute left-4 top-3.5 w-4 h-4 text-gray-400"></i>
                        <input type="tel" id="reg-phone" placeholder="Namba ya Simu" required 
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-yellow-500 outline-none text-sm">
                    </div>
                    <div class="relative">
                        <i data-lucide="map-pin" class="absolute left-4 top-3.5 w-4 h-4 text-gray-400"></i>
                        <select id="reg-branch" class="w-full pl-11 pr-4 py-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 outline-none appearance-none text-sm">
                            <option value="Dar es Salaam">Tawi: Dar es Salaam</option>
                            <option value="Dodoma">Tawi: Dodoma</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-black text-white font-black py-3.5 rounded-xl hover:bg-slate-800 transition shadow-lg active:scale-95 text-sm">
                        JISAJILI SASA
                    </button>
                    <p class="text-center text-[10px] font-bold text-gray-400 mt-2 cursor-pointer hover:text-yellow-600" onclick="toggleForms()">Umeshasajiliwa? Login hapa</p>
                </form>

                <form id="loginForm" class="space-y-3 hidden-form">
                    <div class="text-center mb-2">
                        <p class="text-xs font-bold text-slate-700">Weka namba yako ya simu</p>
                    </div>
                    <div class="relative">
                        <i data-lucide="phone-forwarded" class="absolute left-4 top-3.5 w-4 h-4 text-gray-400"></i>
                        <input type="tel" id="login-phone" placeholder="Namba ya Simu" required 
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-yellow-500 outline-none text-sm">
                    </div>
                    <button type="submit" class="w-full bg-yellow-500 text-black font-black py-3.5 rounded-xl hover:bg-yellow-400 transition shadow-lg active:scale-95 flex items-center justify-center gap-2 text-sm">
                        VERIFY & INGIA <i data-lucide="shield-check" class="w-4 h-4"></i>
                    </button>
                    <p class="text-center text-[10px] font-bold text-gray-400 mt-2 cursor-pointer hover:text-yellow-600" onclick="toggleForms()">Rudi kujisajili upya</p>
                </form>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
                    <div class="relative flex justify-center text-[9px] uppercase font-bold tracking-widest text-gray-300">
                        <span class="bg-white px-3 italic">Staff Only</span>
                    </div>
                </div>

                <button onclick="window.location.href='admin_login.html'" 
                    class="w-full bg-slate-50 text-slate-400 font-bold py-2.5 rounded-xl hover:bg-slate-100 transition-all flex items-center justify-center gap-2 text-xs">
                    <i data-lucide="lock" class="w-3 h-3"></i> ADMIN LOGIN
                </button>
            </div>
        </main>

        <footer class="w-full mt-auto">
            <img src="indexfooter.webp" alt="Footer Decoration" class="w-full h-auto object-cover block">
        </footer>
    </div>

    <script>
        lucide.createIcons();

        const registerForm = document.getElementById('registerForm');
        const loginForm = document.getElementById('loginForm');
        const subtitle = document.getElementById('form-subtitle');

        const savedUser = JSON.parse(localStorage.getItem('registeredUser'));
        if (savedUser) {
            showLogin();
        }

        function toggleForms() {
            if (registerForm.classList.contains('hidden-form')) {
                showRegister();
            } else {
                showLogin();
            }
        }

        function showLogin() {
            registerForm.classList.add('hidden-form');
            loginForm.classList.remove('hidden-form');
            subtitle.innerText = "Verify Taarifa Zako";
        }

        function showRegister() {
            loginForm.classList.add('hidden-form');
            registerForm.classList.remove('hidden-form');
            subtitle.innerText = "Jisajili kupata huduma";
        }

        registerForm.onsubmit = (e) => {
            e.preventDefault();
            const newUser = {
                name: document.getElementById('reg-name').value,
                phone: document.getElementById('reg-phone').value,
                branch: document.getElementById('reg-branch').value
            };
            localStorage.setItem('registeredUser', JSON.stringify(newUser));
            alert("Usajili Umefanikiwa! Sasa login kuendelea.");
            showLogin();
        };

        loginForm.onsubmit = (e) => {
            e.preventDefault();
            const inputPhone = document.getElementById('login-phone').value;
            const userData = JSON.parse(localStorage.getItem('registeredUser'));

            if (userData && userData.phone === inputPhone) {
                localStorage.setItem('currentUser', JSON.stringify(userData));
                window.location.href = 'home.html';
            } else {
                alert("Namba hii haijasajiliwa! Tafadhali jisajili kwanza.");
            }
        };
    </script>
</body>
</html>
