<!DOCTYPE html>
<html lang="sw" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shishi Food Point | Official App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f9f9f9; color: #1a1a1a; }
        .hidden { display: none !important; }
        #user-avatar { width: 45px; height: 45px; background: #d35400; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .slider-container { position: relative; width: 100%; max-width: 800px; margin: 0 auto 20px; height: 350px; overflow: hidden; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .slider { display: flex; transition: transform 0.7s ease-in-out; height: 100%; }
        .slider img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }
        .auth-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 400px; margin: 40px auto; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; outline: none; margin-bottom: 15px; }
        .input-group input:focus { border-color: #d35400; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 25px; box-shadow: 0 -10px 25px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-radius: 25px 25px 0 0; }
        #success-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .progress-bar { width: 0%; height: 4px; background: #22c55e; transition: width 5s linear; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container mx-auto px-4 py-10 text-center">
        <h1 class="text-4xl font-black text-orange-600 mb-2">SHISHI FOOD</h1>
        <p class="text-gray-500 mb-8 uppercase tracking-widest text-xs font-bold">Ladha Halisi ya Kiafrika</p>

        <div class="auth-card" id="register-form">
            <h2 class="text-xl font-bold mb-6">Jisajili sasa</h2>
            <div class="input-group">
                <input type="text" id="reg-name" placeholder="Jina lako la kwanza">
                <input type="tel" id="reg-phone" placeholder="Namba ya simu">
                <input type="password" id="reg-pass" placeholder="Password (Herufi 6+)">
            </div>
            <button onclick="handleRegister()" class="w-full bg-orange-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-orange-700 transition">Tengeneza Akaunti</button>
            <p class="mt-4 text-sm text-gray-500">Tayari una akaunti? <a href="javascript:void(0)" onclick="toggleAuth()" class="text-orange-600 font-bold underline">Ingia hapa</a></p>
        </div>

        <div class="auth-card hidden" id="login-form">
            <h2 class="text-xl font-bold mb-6">Ingia Kwenye App</h2>
            <div class="input-group">
                <input type="tel" id="login-phone" placeholder="Namba ya simu">
                <input type="password" id="login-pass" placeholder="Password">
            </div>
            <button onclick="handleLogin()" class="w-full bg-black text-white py-4 rounded-xl font-bold shadow-lg hover:opacity-90 transition">Ingia</button>
            <p class="mt-4 text-sm text-gray-500">Hauna akaunti bado? <a href="javascript:void(0)" onclick="toggleAuth()" class="text-orange-600 font-bold underline">Jisajili hapa</a></p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-[100] border-b p-4">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="user-avatar">?</div>
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase leading-none">Karibu tena,</p>
                        <p id="user-name-display" class="font-extrabold text-gray-800">Mteja</p>
                    </div>
                </div>
                <button onclick="logout()" class="text-red-500 font-bold text-xs bg-red-50 px-3 py-2 rounded-lg">Logout</button>
            </div>
        </header>

        <section class="p-4 bg-white">
            <div class="slider-container">
                <div class="slider" id="main-slider">
                    <img src="1000275268.webp" alt="Food 1">
                    <img src="1000275267.webp" alt="Food 2">
                    <img src="1000275255.webp" alt="Food 3">
                    <img src="shishi-food.webp" alt="Food 4">
                    <img src="background-chini.webp" alt="Food 5">
                </div>
            </div>
        </section>

        <section class="container mx-auto px-4 py-6 pb-32">
            <h2 class="text-2xl font-black uppercase text-gray-800 mb-1">Menu ya Leo</h2>
            <p id="current-day-display" class="text-orange-600 font-bold text-sm mb-6">Siku...</p>

            <div id="menu-items-list" class="space-y-4"></div>

            <div class="mt-8">
                <label class="font-bold text-sm text-gray-600 ml-1">Maelekezo Maalum:</label>
                <textarea id="special-instructions" class="w-full mt-2 p-4 bg-white border border-gray-100 rounded-2xl outline-none" rows="2" placeholder="Mfano: Bila pilipili..."></textarea>
            </div>
        </section>

        <div class="bottom-nav">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase leading-none">Jumla</p>
                <p class="text-2xl font-black text-orange-600"><span id="grand-total">0</span> <small class="text-xs">TZS</small></p>
            </div>
            <button onclick="processOrder()" class="bg-green-500 text-white px-8 py-4 rounded-2xl font-black shadow-lg flex items-center gap-2">
                <i class="fab fa-whatsapp text-xl"></i> TUMA ODA
            </button>
        </div>
    </div>

    <div id="success-overlay" class="hidden">
        <div class="bg-white p-8 rounded-3xl text-center max-w-xs shadow-2xl border-4 border-green-500 relative">
            <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 text-gray-800">Oda Tayari!</h2>
            <p class="text-sm text-gray-500 mb-6">Unahamishwa kwenda WhatsApp...</p>
            <div class="w-full bg-gray-100 rounded-full h-1 overflow-hidden">
                <div id="order-progress" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <script>
        const prices = {
            "Ugali & Kuku wa Kukaanga": 12000, "Wali & Maharage": 5000, "Biriyani ya Mbuzi": 15000,
            "Ugali & Samaki Sato": 12000, "Pilau Kuku": 12000, "Ugali & Kuku": 12000,
            "Wali & Kuku": 12000, "Ugali & Maini": 8000, "Biriyani Special": 15000,
            "Kisinia Mixed Meats": 30000, "Kisinia Special": 45000, "Ugali & Samaki": 12000, "Pilau Special": 15000
        };

        const menuData = {
            "Jumatatu": ["Ugali & Kuku wa Kukaanga", "Wali & Maharage"],
            "Jumanne": ["Biriyani ya Mbuzi", "Ugali & Samaki Sato"],
            "Jumatano": ["Pilau Kuku", "Ugali & Kuku"],
            "Alhamisi": ["Wali & Kuku", "Ugali & Maini"],
            "Ijumaa": ["Biriyani Special", "Kisinia Mixed Meats"],
            "Jumamosi": ["Kisinia Special", "Ugali & Samaki"],
            "Jumapili": ["Pilau Special", "Ugali & Kuku"]
        };

        let userData = JSON.parse(localStorage.getItem('shishiUser')) || null;
        let cart = {};
        const days = ["Jumapili", "Jumatatu", "Jumanne", "Jumatano", "Alhamisi", "Ijumaa", "Jumamosi"];
        const today = days[new Date().getDay()];

        // Muhimu: Hakikisha overlay imefichwa app ikianza
        document.getElementById('success-overlay').classList.add('hidden');

        function toggleAuth() {
            document.getElementById('register-form').classList.toggle('hidden');
            document.getElementById('login-form').classList.toggle('hidden');
        }

        function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const pass = document.getElementById('reg-pass').value;
            if(!name || !phone || pass.length < 6) { alert("Jaza taarifa zote!"); return; }
            userData = { name, phone, pass };
            localStorage.setItem('shishiUser', JSON.stringify(userData));
            alert("Akaunti imetengenezwa! Ingia sasa.");
            toggleAuth();
        }

        function handleLogin() {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            const saved = JSON.parse(localStorage.getItem('shishiUser'));
            if(saved && saved.phone === phone && saved.pass === pass) {
                userData = saved;
                initApp();
            } else { alert("Namba au Password si sahihi!"); }
        }

        function initApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('user-avatar').innerText = userData.name.charAt(0).toUpperCase();
            document.getElementById('user-name-display').innerText = userData.name;
            document.getElementById('current-day-display').innerText = "Leo ni " + today;
            renderMenu();
        }

        function renderMenu() {
            const container = document.getElementById('menu-items-list');
            const items = menuData[today] || [];
            container.innerHTML = items.map(name => `
                <div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm">
                    <div>
                        <p class="font-extrabold text-gray-800">${name}</p>
                        <p class="text-orange-600 font-black text-sm">${prices[name].toLocaleString()} TZS</p>
                    </div>
                    <div class="flex items-center gap-4 bg-gray-50 p-2 rounded-xl">
                        <button onclick="updateQty('${name}', -1)" class="w-8 h-8 bg-white rounded-lg font-black">-</button>
                        <span id="qty-${name}" class="font-black">0</span>
                        <button onclick="updateQty('${name}', 1)" class="w-8 h-8 bg-orange-600 text-white rounded-lg font-black">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(name, delta) {
            if(!cart[name]) cart[name] = 0;
