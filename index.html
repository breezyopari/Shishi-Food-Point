<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingia | Shishi Food Point</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-pattern {
        
            background-image: url("logo.webp");
        }
    </style>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-[2.5rem] shadow-2xl border-4 border-black/5">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-black rounded-3xl flex items-center justify-center mx-auto mb-4 rotate-6 shadow-xl">
                <i data-lucide="utensils-crosses" class="text-yellow-400 w-10 h-10"></i>
            </div>
            <h2 class="text-3xl font-black tracking-tighter uppercase text-slate-900">
                SHISHI <span class="text-yellow-500">FOOD</span>
            </h2>
            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-1">Ladha Halisi ya Kiafrika</p>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div class="relative">
                <i data-lucide="user" class="absolute left-4 top-4 w-5 h-5 text-gray-400"></i>
                <input type="text" id="username" placeholder="Jina lako kamili" required 
                    class="w-full pl-12 pr-4 py-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-yellow-500 outline-none transition-all">
            </div>

            <div class="relative">
                <i data-lucide="phone" class="absolute left-4 top-4 w-5 h-5 text-gray-400"></i>
                <input type="tel" id="phone" placeholder="Namba ya Simu" required 
                    class="w-full pl-12 pr-4 py-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-yellow-500 outline-none transition-all">
            </div>

            <div class="relative">
                <i data-lucide="map-pin" class="absolute left-4 top-4 w-5 h-5 text-gray-400"></i>
                <select id="branch" class="w-full pl-12 pr-4 py-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 outline-none appearance-none focus:ring-2 focus:ring-yellow-500">
                    <option value="Dar es Salaam">Tawi: Dar es Salaam (Mabatini)</option>
                    <option value="Dodoma">Tawi: Dodoma (City Center)</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl hover:bg-yellow-400 transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
                INGIA  <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-100"></div>
            </div>
            <div class="relative flex justify-center text-xs uppercase">
                <span class="bg-white px-4 text-gray-300 font-bold tracking-widest">Au Ingia Kama</span>
            </div>
        </div>

        <div class="space-y-3">
            <button onclick="window.location.href='admin_login.html'" 
                class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all flex items-center justify-center gap-2 shadow-md border-b-4 border-slate-700 active:border-b-0">
                <i data-lucide="shield-check" class="w-5 h-5 text-yellow-500"></i> 
                LOGIN AS ADMIN
            </button>
        </div>

        <p class="mt-8 text-center text-[11px] text-gray-400 font-medium italic">
            &copy; 2026 Shishi Food Point. Haki zote zimehifadhiwa.
        </p>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Handle Form Submission
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            
            const userData = {
                name: document.getElementById('username').value,
                phone: document.getElementById('phone').value,
                branch: document.getElementById('branch').value
            };

            // Hifadhi taarifa za mteja
            localStorage.setItem('currentUser', JSON.stringify(userData));
            
            // Peleka kwenye Menu
            window.location.href = 'home.html';
        };
    </script>
</body>
</html>
