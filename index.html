<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shishi Food</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage" class="min-h-screen flex items-center justify-center bg-yellow-50">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-[350px] text-center">
        <h2 class="text-2xl font-extrabold mb-4">Karibu Shishi Food</h2>

        <input id="username" type="text" placeholder="Jina lako"
            class="w-full p-3 border rounded-lg mb-3">

        <input id="password" type="password" placeholder="Password"
            class="w-full p-3 border rounded-lg mb-3">

        <!-- BRANCH -->
        <select id="branch" class="w-full p-3 border rounded-lg mb-4">
            <option value="">Chagua Branch</option>
            <option value="Dar es Salaam">Dar es Salaam</option>
            <option value="Dodoma">Dodoma</option>
        </select>

        <button onclick="login()"
            class="w-full bg-yellow-500 text-white p-3 rounded-lg font-bold">
            Login
        </button>

        <p class="text-sm mt-3">
            Huna account?
            <span onclick="showRegister()" class="text-blue-500 cursor-pointer">Jisajili</span>
        </p>

        <button onclick="goHome()"
            class="mt-4 text-gray-500 text-sm underline">
            Endelea bila Login
        </button>
    </div>
</div>

<!-- ================= REGISTER ================= -->
<div id="registerPage" class="hidden min-h-screen flex items-center justify-center bg-yellow-50">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-[350px] text-center">
        <h2 class="text-2xl font-extrabold mb-4">Jisajili</h2>

        <input id="regUser" type="text" placeholder="Jina"
            class="w-full p-3 border rounded-lg mb-3">

        <input id="regPass" type="password" placeholder="Password"
            class="w-full p-3 border rounded-lg mb-4">

        <button onclick="register()"
            class="w-full bg-green-500 text-white p-3 rounded-lg font-bold">
            Sajili
        </button>

        <p class="text-sm mt-3">
            Tayari una account?
            <span onclick="showLogin()" class="text-blue-500 cursor-pointer">Login</span>
        </p>
    </div>
</div>

<!-- ================= MAIN APP ================= -->
<div id="mainApp" class="hidden">

    <nav class="bg-white p-4 shadow flex justify-between">
        <h1 id="welcomeText" class="font-bold text-lg"></h1>
        <button onclick="logout()" class="text-red-500 font-bold">Logout</button>
    </nav>

    <div class="p-6 text-center">
        <h2 class="text-2xl font-bold mb-4">Menu ya Leo</h2>
        <p class="text-gray-600">Chagua chakula chako hapa kama kawaida...</p>
    </div>

</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

// REGISTER
function register(){
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    if(!user || !pass){
        alert("Jaza taarifa zote");
        return;
    }

    users.push({user, pass});
    localStorage.setItem("users", JSON.stringify(users));

    alert("Umefanikiwa kujisajili");
    showLogin();
}

// LOGIN
function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let branch = document.getElementById("branch").value;

    let found = users.find(u => u.user === user && u.pass === pass);

    if(!found){
        alert("Login Imeshindikana");
        return;
    }

    if(!branch){
        alert("Chagua branch");
        return;
    }

    localStorage.setItem("currentUser", user);
    localStorage.setItem("branch", branch);

    openApp();
}

// OPEN APP
function openApp(){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("registerPage").classList.add("hidden");
    document.getElementById("mainApp").classList.remove("hidden");

    let branch = localStorage.getItem("branch") || "Karibu";
    document.getElementById("welcomeText").innerText =
        "Karibu Shishi Food " + branch;
}

// LOGOUT
function logout(){
    localStorage.removeItem("currentUser");
    location.reload();
}

// SWITCH PAGES
function showRegister(){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("registerPage").classList.remove("hidden");
}

function showLogin(){
    document.getElementById("registerPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
}

// SKIP LOGIN
function goHome(){
    localStorage.setItem("branch", "Mteja");
    openApp();
}

// AUTO LOGIN
window.onload = function(){
    if(localStorage.getItem("currentUser")){
        openApp();
    }
}
</script>

</body>
</html>
