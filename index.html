<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shishi Food PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif;background:#f5f5f5}
.hidden{display:none}
.card{background:white;border-radius:15px;padding:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
.btn{padding:10px;border-radius:10px;font-weight:bold}
</style>
</head>

<body>

<!-- NOTIFICATION -->
<div id="toast" class="fixed top-5 right-5 bg-green-500 text-white px-4 py-2 rounded hidden"></div>

<!-- LOGIN -->
<div id="loginPage" class="min-h-screen flex items-center justify-center">
<div class="card w-[350px] text-center">

<h2 class="text-xl font-bold mb-4">Shishi Food Login</h2>

<input id="username" placeholder="Username" class="w-full p-2 border mb-2 rounded">
<input id="password" type="password" placeholder="Password" class="w-full p-2 border mb-2 rounded">

<select id="branch" class="w-full p-2 border mb-3 rounded">
<option value="">Chagua Branch</option>
<option>Dar es Salaam</option>
<option>Dodoma</option>
</select>

<button onclick="login()" class="btn bg-yellow-500 text-white w-full">Login</button>

<button onclick="skip()" class="text-sm mt-3 underline">Endelea bila login</button>

</div>
</div>

<!-- APP -->
<div id="app" class="hidden p-4">

<div class="flex justify-between mb-4">
<h2 id="welcome" class="font-bold"></h2>
<button onclick="logout()" class="text-red-500">Logout</button>
</div>

<!-- MENU -->
<div class="card">

<h3 class="font-bold mb-3">Menu</h3>

<div class="flex justify-between mb-2">
<span>Ugali & Kuku</span>
<div>
<button onclick="qty('kuku',-1)">-</button>
<span id="kuku">0</span>
<button onclick="qty('kuku',1)">+</button>
</div>
</div>

<div class="flex justify-between mb-2">
<span>Ugali & Samaki</span>
<div>
<button onclick="qty('samaki',-1)">-</button>
<span id="samaki">0</span>
<button onclick="qty('samaki',1)">+</button>
</div>
</div>

</div>

<!-- DELIVERY -->
<div class="card mt-4">

<h3 class="font-bold mb-3">Delivery Info</h3>

<input id="phone" placeholder="Namba ya simu" class="w-full p-2 border mb-2 rounded">
<input id="location" placeholder="Mahali ulipo" class="w-full p-2 border mb-2 rounded">
<textarea id="note" placeholder="Maelezo..." class="w-full p-2 border rounded"></textarea>

</div>

<!-- ORDER -->
<button onclick="preview()" class="btn bg-blue-500 text-white w-full mt-4">
Preview Order
</button>

</div>

<!-- PREVIEW -->
<div id="previewBox" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">

<div class="card w-[300px]">

<h3 class="font-bold mb-3">Order Summary</h3>

<div id="summary"></div>

<button onclick="send()" class="btn bg-green-500 text-white w-full mt-3">
Confirm & Send
</button>

</div>

</div>

<!-- ADMIN -->
<div id="adminPage" class="hidden p-4">

<h2 class="font-bold mb-3">ADMIN DASHBOARD</h2>

<div id="orders"></div>

</div>

<script>
let order={};
let allOrders=JSON.parse(localStorage.getItem("orders"))||[];

/* TOAST */
function show(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.remove("hidden");
setTimeout(()=>t.classList.add("hidden"),2000);
}

/* LOGIN */
function login(){
let u=username.value;
let p=password.value;
let b=branch.value;

if(u==="admin" && p==="1234"){
loginPage.classList.add("hidden");
adminPage.classList.remove("hidden");
renderAdmin();
return;
}

if(!b){show("Chagua branch");return;}

localStorage.setItem("branch",b);
openApp();
}

function skip(){
localStorage.setItem("branch","Mteja");
openApp();
}

/* APP */
function openApp(){
loginPage.classList.add("hidden");
app.classList.remove("hidden");

welcome.innerText="Karibu Shishi Food "+localStorage.getItem("branch");
}

/* QTY */
function qty(name,val){
let el=document.getElementById(name);
let n=parseInt(el.innerText)+val;
if(n<0)n=0;
el.innerText=n;

if(n>0)order[name]=n;
else delete order[name];
}

/* PREVIEW */
function preview(){
if(Object.keys(order).length===0){
show("Chagua chakula");return;
}

let s="";
for(let k in order){
s+=k+"("+order[k]+")<br>";
}

summary.innerHTML=s;
previewBox.classList.remove("hidden");
}

/* SEND */
function send(){
let phone=document.getElementById("phone").value;
let loc=document.getElementById("location").value;

if(!phone||!loc){
show("Jaza delivery info");return;
}

let data={
items:order,
phone,
loc,
date:new Date().toLocaleString()
};

allOrders.unshift(data);
localStorage.setItem("orders",JSON.stringify(allOrders));

previewBox.classList.add("hidden");

show("Order imetumwa!");

order={};
document.querySelectorAll("span").forEach(s=>{
if(!isNaN(s.innerText))s.innerText=0;
});

setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),2000);
}

/* ADMIN */
function renderAdmin(){
let box=document.getElementById("orders");

if(allOrders.length===0){
box.innerHTML="Hakuna orders";
return;
}

box.innerHTML=allOrders.map(o=>
`<div class="card mb-2">
${o.date}<br>
${JSON.stringify(o.items)}<br>
📞 ${o.phone}<br>
📍 ${o.loc}
</div>`).join("");
}

/* LOGOUT */
function logout(){
location.reload();
}
</script>

</body>
</html>
