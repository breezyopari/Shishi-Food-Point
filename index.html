<!DOCTYPE html>
<html lang="sw" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shishi Food Point | Login & Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfc; }
        .hidden { display: none; }
        
        /* --- PROFILE ICON STYLING --- */
        #user-profile { width: 45px; height: 45px; background: #d35400; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid white; }

        /* --- SLIDER --- */
        .slider-container { position: relative; width: 100%; max-width: 800px; margin: 0 auto 20px; height: 300px; overflow: hidden; border-radius: 20px; }
        .slider { display: flex; transition: transform 0.7s ease-in-out; height: 100%; }
        .slider img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }

        /* --- FORMS --- */
        .auth-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin: 40px auto; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #d35400; }

        /* --- ORDER BAR --- */
        .total-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; border-radius: 20px 20px 0 0; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container mx-auto px-4 text-center">
        <div class="mt-10 mb-6">
            <h1 class="text-3xl font-black text-orange-600">SHISHI FOOD POINT</h1>
            <p class="text-gray-500 text-sm">Jisajili ili uanze kuagiza chakula</p>
        </div>

        <div class="auth-card" id="register-form">
            <h2 class="text-xl font-bold mb-6">Tengeneza Akaunti</h2>
            <div class="input-group">
                <label>Jina Kamili</label>
                <input type="text" id="reg-name" placeholder="Mfano: Peterson">
            </div>
            <div class="input-group">
                <label>Namba ya Simu</label>
                <input type="tel" id="reg-phone" placeholder="07XXXXXXXX">
            </div>
            <div class="input-group">
                <label>Password (Herufi 6+)</label>
                <input type="password" id="reg-pass" placeholder="******">
            </div>
            <button onclick="handleRegister()" class="w-100 bg-orange-600 text-white w-full py-3 rounded-xl font-bold shadow-lg">Jisajili Sasa</button>
            <p class="mt-4 text-sm">Tayari una akaunti? <a href="#" onclick="toggleAuth()" class="text-orange-600 font-bold">Ingia hapa</a></p>
        </div>

        <div class="auth-card hidden" id="login-form">
            <h2 class="text-xl font-bold mb-6">Ingia Kwenye Akaunti</h2>
            <div class="input-group">
                <label>Namba ya Simu</label>
                <input type="tel" id="login-phone">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-pass">
            </div>
            <button onclick="handleLogin()" class="w-100 bg-orange-600 text-white w-full py-3 rounded-xl font-bold shadow-lg">Ingia</button>
            <p class="mt-4 text-sm">Hauna akaunti? <a href="#" onclick="toggleAuth()" class="text-orange-600 font-bold">Jisajili</a></p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div id="user-profile">P</div> <div>
                    <p class="text-[10px] text-gray-500 leading-none uppercase">Karibu,</p>
                    <p id="display-name" class="font-bold text-sm">Mteja</p>
                </div>
            </div>
            <button onclick="logout()" class="text-xs text-red-500 font-bold">Logout</button>
        </nav>

        <div class="slider-container mt-4 mx-4">
            <div class="slider" id="main-slider">
                <img src="1000275268.webp" alt="Food 1">
                <img src="1000275267.webp" alt="Food 2">
                <img src="1000275255.webp" alt="Food 3">
            </div>
        </div>

        <div class="px-4 pb-32">
            <h3 class="font-black text-lg mb-4">MENU YA LEO</h3>
            
            <div class="space-y-4">
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100">
                    <div>
                        <p class="font-bold">Ugali & Kuku</p>
                        <p class="text-orange-600 font-black text-sm">12,000 TZS</p>
                    </div>
                    <div class="flex items-center gap-3 bg-gray-50 p-2 rounded-xl">
                        <button onclick="updateQty('Ugali & Kuku', -1, 12000)" class="w-8 h-8 bg-white rounded-lg shadow-sm font-bold">-</button>
                        <span id="qty-Ugali & Kuku" class="font-bold">0</span>
                        <button onclick="updateQty('Ugali & Kuku', 1, 12000)" class="w-8 h-8 bg-orange-600 text-white rounded-lg shadow-sm font-bold">+</button>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100">
                    <div>
                        <p class="font-bold">Kisinia (Mixed)</p>
                        <p class="text-orange-600 font-black text-sm">25,000 TZS</p>
                    </div>
                    <div class="flex items-center gap-3 bg-gray-50 p-2 rounded-xl">
                        <button onclick="updateQty('Kisinia', -1, 25000)" class="w-8 h-8 bg-white rounded-lg shadow-sm font-bold">-</button>
                        <span id="qty-Kisinia" class="font-bold">0</span>
                        <button onclick="updateQty('Kisinia', 1, 25000)" class="w-8 h-8 bg-orange-600 text-white rounded-lg shadow-sm font-bold">+</button>
                    </div>
                </div>
            </div>

            <div class="mt-6">
                <label class="text-sm font-bold text-gray-600">Maelekezo Maalum:</label>
                <textarea id="order-note" class="w-full mt-2 p-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-orange-500" rows="2" placeholder="Mfano: Pilipili nyingi..."></textarea>
            </div>
        </div>

        <div class="total-bar">
            <div>
                <p class="text-xs text-gray-500">Jumla ya Malipo</p>
                <p class="text-xl font-black text-orange-600"><span id="grand-total">0</span> TZS</p>
            </div>
            <button onclick="sendOrder()" class="bg-green-500 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2">
                <i class="fab fa-whatsapp"></i> Tuma Oda
            </button>
        </div>
    </div>

    <script>
        let userData = JSON.parse(localStorage.getItem('shishiUser')) || null;
        let currentOrder = {};
        let grandTotal = 0;

        // 1. AUTH LOGIC
        function toggleAuth() {
            document.getElementById('register-form').classList.toggle('hidden');
            document.getElementById('login-form').classList.toggle('hidden');
        }

        function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const pass = document.getElementById('reg-pass').value;

            if(name === "" || phone === "" || pass.length < 6) {
                alert("Tafadhali jaza maelezo yote. Password lazima iwe na herufi 6 au zaidi.");
                return;
            }

            const user = { name, phone, pass };
            localStorage.setItem('shishiUser', JSON.stringify(user));
            alert("Usajili Umekamilika! Sasa ingia.");
            toggleAuth();
        }

        function handleLogin() {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            const savedUser = JSON.parse(localStorage.getItem('shishiUser'));

            if(savedUser && savedUser.phone === phone && savedUser.pass === pass) {
                userData = savedUser;
                showApp();
            } else {
                alert("Namba ya simu au Password siyo sahihi!");
            }
        }

        function showApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            
            // Weka Herufi ya Kwanza ya Jina
            const firstLetter = userData.name.charAt(0).toUpperCase();
            document.getElementById('user-profile').innerText = firstLetter;
            document.getElementById('display-name').innerText = userData.name;
        }

        // 2. ORDER LOGIC
        function updateQty(item, delta, price) {
            if(!currentOrder[item]) currentOrder[item] = 0;
            currentOrder[item] += delta;
            if(currentOrder[item] < 0) currentOrder[item] = 0;

            document.getElementById(`qty-${item}`).innerText = currentOrder[item];
            calculateTotal();
        }

        function calculateTotal() {
            // Mfano wa bei: Ugali (12000), Kisinia (25000)
            let total = (currentOrder['Ugali & Kuku'] || 0) * 12000 + 
                        (currentOrder['Kisinia'] || 0) * 25000;
            grandTotal = total;
            document.getElementById('grand-total').innerText = total.toLocaleString();
        }

        function sendOrder() {
            if(grandTotal === 0) {
                alert("Chagua chakula kwanza!");
                return;
            }
            const note = document.getElementById('order-note').value;
            let text = `Habari Shishi Food! Oda kutoka kwa ${userData.name}:%0A`;
            for(let key in currentOrder) {
                if(currentOrder[key] > 0) text += `✅ ${key}: ${currentOrder[key]}%0A`;
            }
            text += `%0A💰 *JUMLA: ${grandTotal.toLocaleString()} TZS*`;
            if(note) text += `%0A📝 Maelekezo: ${note}`;
            
            window.open(`https://wa.me/255712345678?text=${text}`, '_blank');
        }

        function logout() {
            localStorage.removeItem('shishiUser');
            location.reload();
        }

        // Auto-login kama ana akaunti
        if(userData) showApp();

        // Slider Logic
        let sIdx = 0;
        setInterval(() => {
            sIdx = (sIdx + 1) % 3;
            document.getElementById('main-slider').style.transform = `translateX(-${sIdx * 100}%)`;
        }, 4000);
    </script>
</body>
</html>
