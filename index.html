<!DOCTYPE html>
<html lang="sw" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shishi Food Point | Official App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f9f9f9; color: #1a1a1a; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Profile Icon */
        #user-avatar { width: 45px; height: 45px; background: #d35400; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Slider */
        .slider-container { position: relative; width: 100%; max-width: 800px; margin: 0 auto 20px; height: 250px; overflow: hidden; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .slider { display: flex; transition: transform 0.7s ease-in-out; height: 100%; }
        .slider img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }

        /* Auth Cards */
        .auth-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 400px; margin: 20px auto; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; outline: none; margin-bottom: 15px; }
        .input-group input:focus { border-color: #d35400; }

        /* Floating Total Bar */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 25px; box-shadow: 0 -10px 25px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-radius: 25px 25px 0 0; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container mx-auto px-4 py-10 text-center">
        <h1 class="text-4xl font-black text-orange-600 mb-2 uppercase">Shishi Food</h1>
        <p class="text-gray-500 mb-8 uppercase tracking-widest text-xs font-bold italic">Ladha Halisi ya Kiafrika</p>

        <div class="auth-card" id="register-form">
            <h2 class="text-xl font-bold mb-6">Jisajili sasa</h2>
            <div class="input-group">
                <input type="text" id="reg-name" placeholder="Jina lako">
                <input type="tel" id="reg-phone" placeholder="Namba ya simu">
                <input type="password" id="reg-pass" placeholder="Password (Herufi 6+)">
            </div>
            <button onclick="handleRegister()" class="w-full bg-orange-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-orange-700 transition">Tengeneza Akaunti</button>
            <p class="mt-4 text-sm text-gray-500">Tayari una akaunti? <a href="javascript:void(0)" onclick="toggleAuth()" class="text-orange-600 font-bold underline">Ingia hapa</a></p>
        </div>

        <div class="auth-card hidden" id="login-form">
            <h2 class="text-xl font-bold mb-6">Ingia Kwenye App</h2>
            <div class="input-group">
                <input type="tel" id="login-phone" placeholder="Namba ya simu">
                <input type="password" id="login-pass" placeholder="Password">
            </div>
            <button onclick="handleLogin()" class="w-full bg-black text-white py-4 rounded-xl font-bold shadow-lg hover:opacity-90 transition">Ingia</button>
            <p class="mt-4 text-sm text-gray-500">Hauna akaunti bado? <a href="javascript:void(0)" onclick="toggleAuth()" class="text-orange-600 font-bold underline">Jisajili hapa</a></p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-[100] border-b p-4">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="user-avatar">?</div>
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase leading-none">Karibu tena,</p>
                        <p id="user-name-display" class="font-extrabold text-gray-800 italic">Mteja</p>
                    </div>
                </div>
                <button onclick="logout()" class="text-red-500 font-bold text-xs bg-red-50 px-3 py-2 rounded-lg">Logout</button>
            </div>
        </header>

        <main class="container mx-auto px-4 pb-32">
            <section class="mt-6">
                <div class="slider-container">
                    <div class="slider" id="main-slider">
                        <img src="shishi-food.webp" alt="Menu 1">
                        <img src="background-chini.webp" alt="Menu 2">
                    </div>
                </div>
            </section>

            <section class="mt-8">
                <h2 class="text-2xl font-black uppercase text-gray-800 mb-4">Orodha ya Leo</h2>
                <div id="food-list" class="space-y-4">
                    </div>
            </section>
        </main>

        <div class="bottom-nav">
            <div>
                <p class="text-gray-400 text-[10px] font-bold uppercase">Jumla ya Oda</p>
                <p id="grand-total" class="text-xl font-black text-gray-900">0 TZS</p>
            </div>
            <button onclick="sendWhatsAppOrder()" class="bg-[#25D366] text-white px-8 py-4 rounded-2xl font-extrabold shadow-xl flex items-center gap-2">
                <i class="fab fa-whatsapp text-xl"></i>
                AGIZA SASA
            </button>
        </div>
    </div>

    <script>
        const menuItems = [
            { id: 1, name: "Ugali & Kuku wa Kukaanga", price: 12000 },
            { id: 2, name: "Ugali na Samaki (Sato)", price: 15000 },
            { id: 3, name: "Wali/Biriyani ya Mbuzi", price: 12000 },
            { id: 4, name: "Pilau Kuku/Mbuzi", price: 10000 },
            { id: 5, name: "Kisinia (Mixed Meats)", price: 25000 }
        ];

        let cart = {};
        let currentUser = JSON.parse(localStorage.getItem('shishi_user_session')) || null;

        function toggleAuth() {
            document.getElementById('register-form').classList.toggle('hidden');
            document.getElementById('login-form').classList.toggle('hidden');
        }

        function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            if(!name || !phone) return alert("Tafadhali jaza jina na namba ya simu!");
            
            const user = { name: name, phone: phone };
            localStorage.setItem('shishi_user_session', JSON.stringify(user));
            showApp(user);
        }

        function handleLogin() {
            const phone = document.getElementById('login-phone').value;
            if(!phone) return alert("Ingiza namba yako ya simu!");
            const user = { name: "Mteja", phone: phone };
            showApp(user);
        }

        function showApp(user) {
            currentUser = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('user-name-display').innerText = user.name;
            document.getElementById('user-avatar').innerText = user.name[0].toUpperCase();
            renderMenu();
        }

        function renderMenu() {
            const list = document.getElementById('food-list');
            list.innerHTML = menuItems.map(item => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-gray-800">${item.name}</h4>
                        <p class="text-orange-600 font-black text-sm">${item.price.toLocaleString()} TZS</p>
                    </div>
                    <div class="flex items-center gap-4 bg-gray-50 p-2 rounded-xl">
                        <button onclick="updateCart(${item.id}, -1)" class="w-8 h-8 bg-white border rounded-lg font-bold shadow-sm">-</button>
                        <span id="qty-${item.id}" class="font-black w-4 text-center">0</span>
                        <button onclick="updateCart(${item.id}, 1)" class="w-8 h-8 bg-orange-600 text-white rounded-lg font-bold shadow-md">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateCart(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            document.getElementById(`qty-${id}`).innerText = cart[id] || 0;
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            for (let id in cart) {
                const item = menuItems.find(i => i.id == id);
                total += item.price * cart[id];
            }
            document.getElementById('grand-total').innerText = total.toLocaleString() + " TZS";
        }

        function logout() {
            localStorage.removeItem('shishi_user_session');
            location.reload();
        }

        function sendWhatsAppOrder() {
            if (Object.keys(cart).length === 0) return alert("Chagua chakula kwanza!");
            let msg = `*ODA MPYA - SHISHI FOOD*%0A`;
            msg += `Mteja: ${currentUser.name}%0A`;
            msg += `---------------------------%0A`;
            for (let id in cart) {
                const item = menuItems.find(i => i.id == id);
                msg += `✅ ${item.name} x${cart[id]}%0A`;
            }
            msg += `---------------------------%0A`;
            msg += `*JUMLA: ${document.getElementById('grand-total').innerText}*%0A%0A`;
            msg += `_System Developer: Peterson Pat (0697118911)_`;
            window.open(`https://wa.me/255697118911?text=${msg}`, '_blank');
        }

        // Slider logic
        let slide = 0;
        setInterval(() => {
            slide = (slide + 1) % 2;
            const slider = document.getElementById('main-slider');
            if(slider) slider.style.transform = `translateX(-${slide * 100}%)`;
        }, 4000);

        if(currentUser) showApp(currentUser);
    </script>
</body>
</html>
