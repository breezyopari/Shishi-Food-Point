<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Shishi Food Point</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .slider { display: flex; transition: 0.5s; }
        .slider img { width: 100%; flex-shrink: 0; border-radius: 20px; height: 250px; object-fit: cover; }
        .status-badge { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        #aboutModal, #payModal { display: none; z-index: 100; }
        #aboutModal.active, #payModal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 font-['Outfit'] pb-20">
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md p-4 border-b flex justify-between items-center shadow-sm">
        <div>
            <span id="userBranch" class="text-[10px] font-bold text-yellow-600 block leading-none"></span>
            <h1 class="font-black text-lg">SHISHI FOOD</h1>
        </div>
        <button onclick="logout()" class="p-2 text-red-500 bg-red-50 rounded-xl"><i data-lucide="log-out" class="w-5 h-5"></i></button>
    </nav>

    <div id="liveStatus" class="px-4 mt-4 hidden">
        <div class="bg-black text-white p-4 rounded-2xl shadow-lg border-l-4 border-yellow-500">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-bold uppercase tracking-widest text-yellow-500">Oda Yako ya Sasa</span>
                <span id="currentStatus" class="status-badge bg-yellow-500 text-black text-[9px] px-2 py-0.5 rounded-full font-black">PENDING</span>
            </div>
            <p id="statusItems" class="text-xs mt-2 font-bold opacity-80"></p>
        </div>
    </div>

    <div class="p-4 overflow-hidden relative">
        <div class="slider" id="slider">
            <img src="shishi-food.webp" alt="1">
            <img src="1000275268.webp" alt="2">
            <img src="1000275255.webp" alt="3">
            <img src="1000275267.webp" alt="3">
        </div>
    </div>

    <div class="px-4 mb-4">
        <h2 id="welcomeMsg" class="text-2xl font-black">Habari! 👋</h2>
        <p class="text-gray-400 text-sm">Chagua chakula chako kitamu leo.</p>
    </div>

    <div class="px-4 space-y-3" id="menu-container"></div>

    <div class="p-4 mt-6 space-y-4">
        <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm">
            <label class="block text-xs font-black text-gray-400 mb-2 uppercase">Maelezo ya ziada</label>
            <textarea id="extra-notes" placeholder="Mfano: Usiweke pilipili..." class="w-full p-4 bg-gray-50 rounded-xl mb-4 outline-none border-none ring-1 ring-gray-100 text-sm h-20 resize-none"></textarea>

            <label class="block text-xs font-black text-gray-400 mb-2">MAHALI PA KULETA</label>
            <input type="text" id="location" placeholder="Mtaa / Ofisi" class="w-full p-4 bg-gray-50 rounded-xl mb-4 outline-none border-none ring-1 ring-gray-100">
            
            <label class="block text-xs font-black text-gray-400 mb-2">NJIA YA MALIPO</label>
            <select id="payment-method" class="w-full p-4 bg-gray-50 rounded-xl outline-none border-none ring-1 ring-gray-100">
                <option value="Mobile Money">Mobile Money (M-Pesa/Tigo/n.k)</option>
                <option value="Cash on Delivery">Cash on Delivery</option>
            </select>
        </div>

        <div class="bg-yellow-500 p-5 rounded-2xl flex justify-between items-center shadow-lg mx-2">
            <span class="font-black text-black text-sm uppercase">Jumla ya Malipo:</span>
            <span id="total-display" class="font-black text-2xl text-black">0 TZS</span>
        </div>

        <button onclick="handleOrderProcess()" class="w-full bg-black text-white font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 transition">
            <i data-lucide="shopping-bag"></i> THIBITISHA ODA
        </button>
    </div>

    <div id="payModal" class="fixed inset-0 bg-black/90 items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 relative overflow-hidden">
            <button onclick="closePayModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black"><i data-lucide="x"></i></button>
            <div id="payment-content">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="smartphone" class="text-yellow-600"></i></div>
                    <h3 class="text-xl font-black">Malipo ya Simu</h3>
                    <p class="text-gray-400 text-xs mt-1">Kiasi: <span id="bill-total" class="text-black font-bold">0 TZS</span></p>
                </div>
                <div id="payment-form" class="space-y-4">
                    <select id="telco" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 outline-none font-bold">
                        <option>M-Pesa</option><option>Tigo Pesa</option><option>Airtel Money</option><option>Halopesa</option>
                    </select>
                    <input type="tel" id="pay-phone" placeholder="07XXXXXXXX" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 outline-none font-bold text-center tracking-widest">
                    <button id="pay-now-btn" onclick="simulatePush()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl shadow-lg active:scale-95 transition">LIPA SASA</button>
                </div>
            </div>
            <div id="payment-success" class="hidden text-center py-6">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-600"><i data-lucide="check-circle-2" class="w-12 h-12"></i></div>
                <h4 class="text-lg font-black text-green-600 uppercase">Malipo Yamepokelewa!</h4>
                <button onclick="finalizeOrder('PAID')" class="mt-6 bg-black text-white px-8 py-3 rounded-xl font-bold">Maliza Oda</button>
            </div>
        </div>
    </div>

    <div id="aboutModal" class="fixed inset-0 bg-black/80 items-center justify-center p-6">
        <div class="relative max-w-xs w-full">
            <button onclick="toggleAbout()" class="absolute -top-12 right-0 text-white bg-red-600 p-2 rounded-full shadow-lg"><i data-lucide="x"></i></button>
            <img src="aboutus.webp" alt="About Us" class="w-full rounded-3xl shadow-2xl">
        </div>
    </div>

    <footer class="mt-12 bg-white border-t border-gray-100 p-6 flex flex-col items-center">
        <button onclick="toggleAbout()" class="mb-6 px-8 py-3 bg-yellow-500 text-black font-black rounded-2xl shadow-lg">About Us</button>
        <img src="homefooter.webp" alt="Footer" class="w-full h-auto object-cover rounded-3xl">
    </footer>

    <script>
        // LAZIMA iitwe 'currentUser' ili iendane na admin_dashboard
        const user = JSON.parse(localStorage.getItem('currentUser')); 
        if(!user) window.location.href = 'index.html';

        document.getElementById('userBranch').innerText = user.branch;
        document.getElementById('welcomeMsg').innerText = `Habari, ${user.name.split(' ')[0]}! 👋`;

        const menuItems = [
            { name: "Wali/Ugali Kuku Rost Kienyeji", price: 12000 },
            { name: "Wali/Ugali Maini", price: 10000 },
            { name: "Wali/Ugali Nyama", price: 9000 },
            { name: "Makange Kuku Kienyeji Nusu", price: 20000 },
            { name: "Makange Kuku Kisasa Nusu", price: 15000 },
            { name: "Chips Kuku", price: 12000 },
            { name: "Chips Yai", price: 6000 },
            { name: "Ugali Mboga Mboga zote", price: 6000 },
            { name: "Pilau Kuku Choma", price: 12000 },
            { name: "Pilau Kuku Rost", price: 15000 },
            { name: "Biriani Kuku Local", price: 15000 },
            { name: "Biriani Kuku Kisasa", price: 12000 },
            { name: "Biriani Nyama", price: 10000 },
            { name: "Biriani Mbuzi", price: 12000 },
            { name: "Biriani Samaki Sato", price: 15000 },
            { name: "Biriani Samaki Tasi/Changu", price: 12000 },
            { name: "Ugali/Wali Samaki Sato Rost", price: 15000 },
            { name: "Ugali/Wali Samaki Sato Mkavu", price: 12000 },
            { name: "Samaki Changu Mkavu Ugali/Wali", price: 10000 },
            { name: "Samaki Rost Changu Ugali/Wali", price: 12000 },
            { name: "Makange Firigisi", price: 12000 },
            { name: "Shishi Taste", price: 15000 },
            { name: "Mafyonso", price: 15000 }
        ];

        let cart = {};
        let totalPrice = 0;

        const menuContainer = document.getElementById('menu-container');
        menuItems.forEach(item => {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-50";
            div.innerHTML = `
                <div class="flex flex-col">
                    <span class="font-bold text-sm">${item.name}</span>
                    <span class="text-yellow-600 font-black text-xs">${item.price.toLocaleString()} TZS</span>
                </div>
                <div class="flex items-center gap-3 bg-gray-50 p-1 rounded-lg">
                    <button onclick="changeQty('${item.name}', -1)" class="w-8 h-8 bg-white rounded-md font-bold text-red-500 shadow-sm border border-gray-100">-</button>
                    <span id="qty-${item.name}" class="font-black min-w-[20px] text-center">0</span>
                    <button onclick="changeQty('${item.name}', 1)" class="w-8 h-8 bg-yellow-500 rounded-md font-bold shadow-sm">+</button>
                </div>`;
            menuContainer.appendChild(div);
        });

        function changeQty(item, d) {
            cart[item] = (cart[item] || 0) + d;
            if(cart[item] <= 0) delete cart[item];
            document.getElementById(`qty-${item}`).innerText = cart[item] || 0;
            updateTotal();
        }

        function updateTotal() {
            totalPrice = 0;
            for (let name in cart) {
                const itemData = menuItems.find(m => m.name === name);
                totalPrice += itemData.price * cart[name];
            }
            document.getElementById('total-display').innerText = `${totalPrice.toLocaleString()} TZS`;
            document.getElementById('bill-total').innerText = `${totalPrice.toLocaleString()} TZS`;
        }

        function handleOrderProcess() {
            const loc = document.getElementById('location').value;
            const payMethod = document.getElementById('payment-method').value;
            if(Object.keys(cart).length === 0 || !loc) return alert("Chagua chakula na mahali!");

            if(payMethod === "Mobile Money") {
                document.getElementById('pay-phone').value = user.phone;
                document.getElementById('payModal').classList.add('active');
            } else {
                finalizeOrder('UNPAID');
            }
        }

        function simulatePush() {
            const phone = document.getElementById('pay-phone').value;
            if(!phone) return alert("Weka namba!");
            const btn = document.getElementById('pay-now-btn');
            btn.innerText = "WAITING..."; btn.disabled = true;
            setTimeout(() => {
                document.getElementById('payment-form').classList.add('hidden');
                document.getElementById('payment-success').classList.remove('hidden');
                lucide.createIcons();
            }, 2000);
        }

        function finalizeOrder(payStatus) {
            const order = {
                id: Date.now(),
                ...user,
                items: {...cart},
                total: totalPrice,
                location: document.getElementById('location').value,
                notes: document.getElementById('extra-notes').value,
                payment_method: document.getElementById('payment-method').value,
                payment_status: payStatus,
                date: new Date().toLocaleString(),
                status: 'PENDING'
            };

            const allOrders = JSON.parse(localStorage.getItem('shishi_master_db')) || [];
            allOrders.unshift(order);
            localStorage.setItem('shishi_master_db', JSON.stringify(allOrders));

            alert("Oda yako imetumwa kwa Admin!");
            location.reload();
        }

        function checkLiveOrder() {
            const allOrders = JSON.parse(localStorage.getItem('shishi_master_db')) || [];
            const myLiveOrder = allOrders.find(o => o.phone === user.phone && o.status !== 'COMPLETED');
            if (myLiveOrder) {
                document.getElementById('liveStatus').classList.remove('hidden');
                document.getElementById('currentStatus').innerText = myLiveOrder.status;
                document.getElementById('statusItems').innerText = Object.entries(myLiveOrder.items).map(([k,v]) => `${k} (x${v})`).join(', ');
                if(myLiveOrder.status === 'RECEIVED') {
                    document.getElementById('currentStatus').className = "status-badge bg-blue-500 text-white text-[9px] px-2 py-0.5 rounded-full font-black";
                }
            } else {
                document.getElementById('liveStatus').classList.add('hidden');
            }
        }

        function closePayModal() { document.getElementById('payModal').classList.remove('active'); }
        function toggleAbout() { document.getElementById('aboutModal').classList.toggle('active'); }
        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }

        // Slider
        let idx = 0;
        setInterval(() => {
            idx = (idx + 1) % 3;
            document.getElementById('slider').style.transform = `translateX(-${idx * 100}%)`;
        }, 3000);

        setInterval(checkLiveOrder, 3000);
        checkLiveOrder();
        lucide.createIcons();
    </script>
</body>
</html>
